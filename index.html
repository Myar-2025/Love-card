<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سؤال خاص ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .card {
            background: white;
            padding: 40px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(214, 48, 49, 0.15);
            text-align: center;
            width: 85%;
            max-width: 340px;
            position: relative;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 {
            color: #d63031;
            font-size: 24px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .buttons-container {
            position: relative;
            height: 120px; /* مساحة كافية للتحرك بحرية */
            width: 100%;
        }
        button {
            padding: 12px 28px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
            position: absolute;
            left: 20px;
            top: 40px;
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            right: 20px;
            top: 40px;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="question">ننوش بتحبيني❤️🫣</h1>
        <div class="buttons-container">
            <button id="yesBtn" onclick="sayYes()">نعم</button>
            <button id="noBtn" ontouchstart="moveButton(event)" onmouseover="moveButton(event)">لا</button>
        </div>
    </div>

    <script>
        function moveButton(e) {
            if(e) e.preventDefault();
            const noBtn = document.getElementById('noBtn');
            const container = document.querySelector('.buttons-container');
            
            // حصر الحركة تماماً داخل حاوية الأزرار لمنع التداخل والتعليق
            const maxX = container.clientWidth - noBtn.offsetWidth;
            const maxY = container.clientHeight - noBtn.offsetHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function sayYes() {
            document.getElementById('question').innerHTML = "بعرف اصلاً وانا بعشقك🫂❤️";
            document.querySelector('.buttons-container').style.display = 'none';
        }
    </script>

</body>
</html>
