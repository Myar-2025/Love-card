<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال خاص ❤️</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 350px;
        }
        h1 {
            color: #d63031;
            font-size: 24px;
            margin-bottom: 40px;
        }
        .buttons {
            display: flex;
            justify-content: space-around;
            position: relative;
            height: 60px;
        }
        button {
            padding: 12px 28px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
            z-index: 10;
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- ✏️ يمكنك مسح جملة "هل تحبينني؟" واكتب سؤالك هنا -->
        <h1 id="question">ننوش عمرااي بتحبيني؟ ❤️🫣</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="sayYes()">نعم</button>
            <button id="noBtn" ontouchstart="moveButton()" onmouseover="moveButton()">لا</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function sayYes() {
            // ✏️ يمكنك تغيير رسالة النجاح والقبول من هنا
            document.getElementById('question').innerHTML = "كنت بعرف اصلاً وانا كمااان ❤️🫂";
            document.querySelector('.buttons').style.display = 'none';
        }
    </script>

</body>
</html>
